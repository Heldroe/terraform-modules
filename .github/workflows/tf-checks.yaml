name: Terraform module checks

on:
  push:
    branches:
      - main
    tags:
      - "*"
  pull_request:
    paths:
      - '**/*.tf'
      - '.tflint.hcl'

jobs:
  # 1. Dynamically find which modules changed in this PR
  find-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.changed-files.outputs.all_changed_files }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Required to accurately detect changed files

      - name: Get changed module directories
        id: changed-files
        uses: tj-actions/changed-files@v47
        with:
          files: '**/*.tf'
          dir_names: true # Returns directory names instead of full file paths
          json: true # Formats the output as a JSON array ['module_a', 'module_b']
          escape_json: false

  # 2. Run checks concurrently for each changed module
  check:
    needs: find-changes
    # Only run if there are actual changes detected
    if: ${{ needs.find-changes.outputs.matrix != '[]' && needs.find-changes.outputs.matrix != '' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # Don't cancel the whole pipeline if one module fails
      matrix:
        module: ${{ fromJSON(needs.find-changes.outputs.matrix) }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v6
        with:
          tflint_version: latest
          cache: true

      - name: Init TFLint
        run: tflint --init
        env:
          # https://github.com/terraform-linters/tflint/blob/master/docs/user-guide/plugins.md#avoiding-rate-limiting
          GITHUB_TOKEN: ${{ github.token }}

      # Cache the provider plugins downloaded during terraform init
      - name: Cache Terraform Providers
        uses: actions/cache@v5
        with:
          path: .terraform.d/plugin-cache
          key: ${{ runner.os }}-terraform-plugin-cache-${{ matrix.module }}-${{ hashFiles('**/*.tf') }}
          restore-keys: |
            ${{ runner.os }}-terraform-plugin-cache-${{ matrix.module }}-
            ${{ runner.os }}-terraform-plugin-cache-

      - name: Run Checks for ${{ matrix.module }}
        run: |
          ./scripts/check.sh ${{ matrix.module }}

  release:
    needs: check # Release after passing checks
    if: startsWith(github.ref, 'refs/tags/') # Only run on tags
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Install tfr-static
        env:
          TFR_STATIC_VERSION: "0.1.2"
          TFR_STATIC_REPOSITORY: "Heldroe/tfr-static"
          TFR_STATIC_ARCH: "linux_amd64"
        run: |
          curl -sL "https://github.com/${TFR_STATIC_REPOSITORY}/releases/download/v${TFR_STATIC_VERSION}/tfr-static_${TFR_STATIC_VERSION}_${TFR_STATIC_ARCH}.tar.gz" -o tfr-static.tar.gz
          tar -xzf tfr-static.tar.gz
          chmod +x tfr-static
          sudo mv tfr-static /usr/local/bin/

      - name: Build terraform registry
        env:
          TFR_BASE_URL: "https://terraform-registry.b-cdn.net"
        run: |
          tfr-static publish \
            --base-url ${TFR_BASE_URL} \
            --all \
            --terraform-docs \
            --gzip \
            --html
