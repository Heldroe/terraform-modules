name: Publish terraform module

on:
  push:
    tags:
      - '**'

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      # tfr-static installation variables
      TFR_STATIC_VERSION: "0.1.2"
      TFR_STATIC_REPOSITORY: "Heldroe/tfr-static"
      TFR_STATIC_ARCH: "linux_amd64"

      # Registry variables
      BASE_URL: "https://terraform-registry.b-cdn.net"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-tags: "true"

      - name: Install tfr-static
        run: |
          curl -sL "https://github.com/${TFR_STATIC_REPOSITORY}/releases/download/v${TFR_STATIC_VERSION}/tfr-static_${TFR_STATIC_VERSION}_${TFR_STATIC_ARCH}.tar.gz" -o tfr-static.tar.gz
          tar -xzf tfr-static.tar.gz
          chmod +x tfr-static
          sudo mv tfr-static /usr/local/bin/

      - name: Generate static registry
        run: |
          TAG_NAME="${{ github.ref_name }}"
          MODULE_NAME="${TAG_NAME%-*}"
          VERSION="${TAG_NAME##*-}"

          echo "========================================"
          echo "Tag: $TAG_NAME"
          echo "Module: $MODULE_NAME"
          echo "Version: $VERSION"
          echo "========================================"

          # TODO: set params as HCL config rather than CLI params
          tfr-static publish \
            --tag "${{ github.ref_name }}" \
            --base-url "$BASE_URL" \
            --terraform-docs \
            --gzip \
            --html \
            --invalidation-file invalidations.txt

      - name: Upload static registry
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL_S3: ${{ secrets.AWS_ENDPOINT_URL_S3 }}
          BUCKET_NAME: ${{ secrets.BUCKET_NAME }}
        run: |
          # Upload modules archives
          aws s3 cp \
            --recursive \
            target/ s3://$BUCKET_NAME/ \
            --include "*.tar.gz" \
            --content-type application/gzip

          # Upload the rest of the files (gzipped)
          aws s3 cp \
            --recursive \
            target/ s3://$BUCKET_NAME/ \
            --endpoint-url https://s3.fr-par.scw.cloud \
            --exclude "*.tar.gz" \
            --content-encoding gzip

      - name: Invalidate CDN paths
        env:
          BUNNYNET_API_KEY: ${{ secrets.BUNNYNET_API_KEY }}
          INVALIDATIONS_FILE: "invalidations.txt"
        run: |
          # Verify the file actually exists to prevent silent failures
          if [[ ! -f "$INVALIDATIONS_FILE" ]]; then
            echo "Error: Invalidations file not found at $INVALIDATIONS_FILE"
            exit 1
          fi

          # Invalidate paths
          while IFS= read -r url || [[ -n "$url" ]]; do
            if [[ -z "$url" ]]; then
              continue
            fi

            # URL-encode the target URL using jq
            ENCODED_URL=$(jq -rn --arg x "$BASE_URL/$url" '$x|@uri')

            echo "Purging: $url"

            curl --request POST \
              --url "https://api.bunny.net/purge?url=$ENCODED_URL" \
              --header "AccessKey: $BUNNYNET_API_KEY" \
              --header "Accept: application/json" \
              --silent --show-error --fail

            echo ""

          done < "$INVALIDATIONS_FILE"
