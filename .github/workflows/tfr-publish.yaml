name: Publish terraform module

on:
  push:
    tags:
      - '**'

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      # Registry variables
      BASE_URL: "https://tfr.davidguerrero.fr"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-tags: "true"

      - name: Setup tfr-static
        uses: ./.github/actions/setup-tfr-static

      - name: Generate static registry
        run: |
          TAG_NAME="${{ github.ref_name }}"
          MODULE_NAME="${TAG_NAME%-*}"
          VERSION="${TAG_NAME##*-}"

          echo "========================================"
          echo "Tag: $TAG_NAME"
          echo "Module: $MODULE_NAME"
          echo "Version: $VERSION"
          echo "========================================"

          # TODO: set params as HCL config rather than CLI params
          tfr-static publish \
            --tag "${{ github.ref_name }}" \
            --base-url "$BASE_URL" \
            --terraform-docs \
            --gzip \
            --html \
            --html-base .tfr-static/base.html \
            --invalidation-full-url \
            --invalidation-url-encode \
            --invalidation-dirs \
            --invalidation-file invalidations.txt

      - name: Upload static registry
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL_S3: ${{ secrets.AWS_ENDPOINT_URL_S3 }}
          BUCKET_NAME: ${{ secrets.BUCKET_NAME }}
        run: |
          # Upload modules archives
          aws s3 cp \
            target/ s3://$BUCKET_NAME/ \
            --recursive \
            --include "*.tar.gz" \
            --content-type application/gzip

          # Upload the rest of the files (gzipped)
          aws s3 cp \
            target/ s3://$BUCKET_NAME/ \
            --recursive \
            --exclude "*.tar.gz" \
            --content-encoding gzip

      - name: Invalidate CDN paths
        env:
          BUNNYNET_API_KEY: ${{ secrets.BUNNYNET_API_KEY }}
          INVALIDATIONS_FILE: "invalidations.txt"
        run: |
          # Verify the file actually exists to prevent silent failures
          if [[ ! -f "$INVALIDATIONS_FILE" ]]; then
            echo "Error: Invalidations file not found at $INVALIDATIONS_FILE"
            exit 1
          fi

          # Invalidate paths
          while IFS= read -r url || [[ -n "$url" ]]; do
            if [[ -z "$url" ]]; then
              continue
            fi

            echo "Purging: $url"
            curl --request POST \
              --url "https://api.bunny.net/purge?exactPath=true&url=$url" \
              --header "AccessKey: $BUNNYNET_API_KEY" \
              --header "Accept: application/json" \
              --silent --show-error --fail

          done < "$INVALIDATIONS_FILE"
